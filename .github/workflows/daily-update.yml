name: Daily Paper Update

on:
  schedule:
    # 每天北京时间 09:00 运行；GitHub Actions 使用 UTC，所以这里是 01:00 UTC。
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch recent papers
        run: python scripts/update_papers.py --max-results 3

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update image papers"
          file_pattern: papers.json
