name: Daily Paper Update

on:
  schedule:
    # Runs every day at 09:00 Beijing time (01:00 UTC).
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch recent papers
        run: python scripts/update_papers.py --year-from 2025 --year-to 2026 --max-results 10 --sources openalex,arxiv

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update image papers"
          file_pattern: papers.json
